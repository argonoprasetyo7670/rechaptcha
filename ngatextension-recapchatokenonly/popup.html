<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>reCAPTCHA Token</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 380px;
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 24px;
        }

        h1 {
            font-size: 18px;
            text-align: center;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 12px;
            text-align: center;
            color: #888;
            margin-bottom: 20px;
        }

        .btn-generate {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #7c3aed 0%, #00d4ff 100%);
            color: #fff;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-generate.loading {
            background: #444;
        }

        .result {
            margin-top: 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 14px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result.success {
            border: 1px solid #10b981;
        }

        .result.error {
            border: 1px solid #ef4444;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 600;
        }

        .result.success .result-header {
            color: #10b981;
        }

        .result.error .result-header {
            color: #ef4444;
        }

        .token-box {
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 11px;
            color: #10b981;
            word-break: break-all;
            max-height: 120px;
            overflow-y: auto;
            line-height: 1.5;
        }

        .error-msg {
            color: #ef4444;
            font-size: 13px;
        }

        .btn-copy {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            margin-top: 10px;
            transition: all 0.2s ease;
        }

        .btn-copy:hover {
            background: rgba(16, 185, 129, 0.3);
        }

        .info {
            margin-top: 16px;
            font-size: 11px;
            color: #666;
            text-align: center;
            line-height: 1.6;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>🔐 reCAPTCHA Token</h1>
    <p class="subtitle">Google Flow Token Generator</p>

    <button id="generateBtn" class="btn-generate">
        <span>⚡</span>
        <span id="btnText">Generate Token</span>
    </button>

    <div id="result" class="result">
        <div class="result-header">
            <span id="resultIcon"></span>
            <span id="resultTitle"></span>
        </div>
        <div id="resultContent"></div>
    </div>

    <p class="info">
        Pastikan sudah login ke akun Google<br>
        Token akan di-generate dari labs.google
    </p>

    <script src="popup.js"></script>
</body>
</html>
